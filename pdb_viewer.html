<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDB Embryo Viewer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #121212;
            --bg-panel: #1e1e1e;
            --text-primary: #e0e0e0;
            --text-secondary: #a0a0a0;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --border: #333;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
        }

        #app {
            display: flex;
            height: 100%;
        }

        /* Sidebar */
        .sidebar {
            width: 300px;
            /* Increased width for notes */
            background-color: var(--bg-panel);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }

        /* Morphokinetic Panel */
        .morpho-panel {
            width: 140px;
            background-color: var(--bg-panel);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 10px;
            gap: 8px;
            overflow-y: auto;
        }

        .morpho-btn {
            padding: 10px;
            background: var(--bg-dark);
            color: var(--text-primary);
            border: 1px solid var(--border);
            border-radius: 4px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            transition: all 0.2s;
            text-align: center;
        }

        .morpho-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
        }

        #embryo-list {
            list-style: none;
            overflow-y: auto;
            flex: 1;
            border-bottom: 1px solid var(--border);
        }

        .embryo-item {
            padding: 15px 20px;
            cursor: pointer;
            border-bottom: 1px solid var(--border);
            transition: background-color 0.2s;
        }

        .embryo-item:hover {
            background-color: rgba(255, 255, 255, 0.05);
        }

        .embryo-item.active {
            background-color: var(--accent);
            color: white;
        }

        /* Annotation Section */
        .annotation-section {
            padding: 20px;
            background-color: var(--bg-panel);
            display: flex;
            flex-direction: column;
            gap: 10px;
            height: 300px;
            /* Fixed height for notes area */
        }

        .annotation-header {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-secondary);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #note-input {
            flex: 1;
            background-color: var(--bg-dark);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text-primary);
            padding: 10px;
            resize: none;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
        }

        #note-input:focus {
            outline: none;
            border-color: var(--accent);
        }

        #export-btn {
            background-color: var(--bg-dark);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.2s;
        }

        #export-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        /* Main Content */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
            align-items: center;
            justify-content: center;
        }

        .viewer-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
        }

        .image-wrapper {
            position: relative;
            display: flex;
            gap: 10px;
        }

        #main-image {
            max-width: 80vw;
            max-height: 65vh;
            border: 1px solid var(--border);
            background: #000;
        }

        .slider-vertical-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100%;
            justify-content: center;
        }

        .slider-vertical-container input[type=range] {
            writing-mode: bt-lr;
            -webkit-appearance: slider-vertical;
            appearance: slider-vertical;
            width: 8px;
            height: 300px;
            padding: 0 5px;
        }

        .controls-container {
            width: 100%;
            max-width: 700px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .slider-horizontal-container {
            display: flex;
            flex-direction: column;
            gap: 5px;
            width: 100%;
        }

        .slider-wrapper {
            position: relative;
            width: 100%;
            height: 20px;
            display: flex;
            align-items: center;
        }

        /* Timeline Markers */
        #timeline-markers {
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 0;
            transform: translateY(-50%);
            pointer-events: none;
            z-index: 5;
        }

        .timeline-marker {
            position: absolute;
            width: 8px;
            height: 8px;
            background-color: #fbbf24;
            /* Amber for notes */
            border-radius: 50%;
            transform: translate(-50%, -50%);
            top: 0;
            pointer-events: none;
            box-shadow: 0 0 2px rgba(0, 0, 0, 0.5);
        }

        .metadata-display {
            display: flex;
            justify-content: space-between;
            background: var(--bg-panel);
            padding: 10px 20px;
            border-radius: 8px;
            font-family: monospace;
        }

        /* Range Slider Styling (Horizontal) */
        input[type=range]:not([orient=vertical]) {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            background: transparent;
            z-index: 10;
            /* Above markers */
            position: relative;
        }

        input[type=range]:not([orient=vertical])::-webkit-slider-runnable-track {
            width: 100%;
            height: 6px;
            cursor: pointer;
            background: var(--border);
            border-radius: 3px;
        }

        input[type=range]:not([orient=vertical])::-webkit-slider-thumb {
            height: 16px;
            width: 16px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
            -webkit-appearance: none;
            margin-top: -5px;
            box-shadow: 0 0 0 2px var(--bg-dark);
            /* Contrast against markers */
        }

        /* Play Button */
        .play-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: var(--accent);
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.1s;
            flex-shrink: 0;
        }

        .play-btn:active {
            transform: scale(0.95);
        }

        .play-btn svg {
            margin-left: 2px;
            fill: white;
        }

        .play-btn svg path {
            fill: white;
        }

        .play-btn.paused svg path {
            d: path("M6 4h4v16H6V4zm8 0h4v16h-4V4z");
        }

        /* History Sidebar */
        .history-sidebar {
            width: 300px;
            background-color: var(--bg-panel);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }

        .history-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            font-weight: 600;
            color: var(--text-primary);
        }

        #history-list {
            list-style: none;
            overflow-y: auto;
            flex: 1;
            padding: 10px;
        }

        .history-item {
            border-bottom: 1px solid var(--border);
            border-radius: 4px;
            transition: background-color 0.2s;
            margin-bottom: 5px;
        }

        .history-item:hover {
            background-color: rgba(255, 255, 255, 0.05);
        }

        .history-time {
            font-size: 0.8rem;
            color: var(--accent);
            margin-bottom: 4px;
            font-weight: 500;
        }

        .history-note {
            font-size: 0.9rem;
            color: var(--text-secondary);
            white-space: pre-wrap;
        }

        /* Arrested State */
        .embryo-item.arrested {
            color: #ff4d4d;
        }

        .arrest-btn {
            padding: 8px 16px;
            background: #333;
            color: white;
            border: 1px solid #555;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .arrest-btn:hover {
            background: #444;
        }

        .arrest-btn.active {
            background: #ff4d4d;
            border-color: #ff4d4d;
            color: white;
        }

        .arrest-btn.active:hover {
            background: #e60000;
        }

        .delete-note-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 4px;
            border-radius: 4px;
            transition: color 0.2s, background-color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .delete-note-btn:hover {
            color: #ff4d4d;
            background-color: rgba(255, 77, 77, 0.1);
        }

        .delete-note-btn svg {
            width: 14px;
            height: 14px;
            fill: currentColor;
            pointer-events: none;
        }

        /* Grading Controls */
        .grading-section {
            display: flex;
            gap: 15px;
            background: var(--bg-panel);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--border);
            align-items: center;
        }

        .grading-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .grading-label {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .grading-select {
            background: var(--bg-dark);
            color: var(--text-primary);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 5px;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
        }

        .grading-select:focus {
            outline: none;
            border-color: var(--accent);
        }

        /* Morphokinetic Table */
        .morpho-table-panel {
            width: 200px;
            background: var(--bg-panel);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }



        .morpho-table-container {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .morpho-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
            border: 1px solid var(--border);
            /* Exterior border */
        }

        .morpho-table th,
        .morpho-table td {
            padding: 8px;
            text-align: left;
            border: 1px solid var(--border);
            /* Grid lines (vertical & horizontal) */
        }

        .morpho-table th {
            color: var(--text-secondary);
            font-weight: 500;
        }

        .morpho-table td:last-child {
            text-align: right;
            font-family: monospace;
        }
    </style>
</head>

<body>
    <div id="app">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>Embryos</h2>
            </div>
            <ul id="embryo-list" class="embryo-list">
                <!-- Embryo items will be injected here -->
            </ul>

        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="viewer-container">
                <div class="image-wrapper">
                    <img id="main-image" src="" alt="Embryo View">

                    <!-- Z-Focus Slider (Vertical) -->
                    <div class="slider-vertical-container">
                        <label for="z-slider"
                            style="writing-mode: vertical-rl; text-orientation: mixed; margin-bottom: 10px; font-size: 0.8rem; color: var(--text-secondary);">Z-Focus</label>
                        <input type="range" id="z-slider" min="0" max="10" value="5" orient="vertical">
                    </div>
                </div>

                <div class="controls-container">
                    <!-- Grading Section -->
                    <div class="grading-section">
                        <div class="grading-group">
                            <label class="grading-label">Day 3 Grade</label>
                            <select id="day3-grade" class="grading-select">
                                <option value="">-</option>
                                <option value="1">1</option>
                                <option value="2">2</option>
                                <option value="3">3</option>
                            </select>
                        </div>
                        <div class="grading-group">
                            <label class="grading-label">Blastocyst Grade</label>
                            <div style="display: flex; gap: 5px;">
                                <select id="blasto-exp" class="grading-select" title="Expansion (1-6)">
                                    <option value="">-</option>
                                    <option value="1">1</option>
                                    <option value="2">2</option>
                                    <option value="3">3</option>
                                    <option value="4">4</option>
                                    <option value="5">5</option>
                                    <option value="6">6</option>
                                </select>
                                <select id="blasto-icm" class="grading-select" title="Inner Cell Mass (A-D)">
                                    <option value="">-</option>
                                    <option value="A">A</option>
                                    <option value="B">B</option>
                                    <option value="C">C</option>
                                    <option value="D">D</option>
                                </select>
                                <select id="blasto-te" class="grading-select" title="Trophectoderm (A-D)">
                                    <option value="">-</option>
                                    <option value="A">A</option>
                                    <option value="B">B</option>
                                    <option value="C">C</option>
                                    <option value="D">D</option>
                                </select>
                            </div>
                        </div>
                        <div class="grading-group" style="margin-left: auto;">
                            <label class="grading-label">Combined</label>
                            <div id="blasto-combined" style="font-family: monospace; font-weight: 600;">-</div>
                        </div>
                    </div>

                    <!-- Playback Controls -->
                    <div class="playback-controls" style="display: flex; align-items: center; gap: 10px; width: 100%;">
                        <button id="play-btn" class="play-btn" aria-label="Play">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none"
                                xmlns="http://www.w3.org/2000/svg">
                                <path d="M8 5V19L19 12L8 5Z" fill="white" />
                            </svg>
                        </button>

                        <select id="speed-select"
                            style="padding: 5px; border-radius: 4px; border: 1px solid var(--border); background: var(--bg-panel); color: var(--text-primary);">
                            <option value="400">0.5x</option>
                            <option value="200" selected>1x</option>
                            <option value="100">2x</option>
                        </select>

                        <!-- Time Slider (Horizontal) -->
                        <div class="slider-horizontal-container" style="flex: 1;">
                            <label for="time-slider"
                                style="font-size: 0.8rem; color: var(--text-secondary);">Time</label>
                            <div class="slider-wrapper">
                                <input type="range" id="time-slider" min="0" max="100" value="0">
                                <div id="timeline-markers"></div>
                            </div>
                        </div>
                    </div>

                    <!-- Metadata Display -->
                    <div class="metadata-display">
                        <div class="meta-item" id="meta-embryo">Embryo: -</div>
                        <div class="meta-item" id="meta-time">Time: -</div>
                        <div class="meta-item" id="meta-z">Z: -</div>
                    </div>

                    <!-- Action Buttons -->
                    <div style="display: flex; justify-content: flex-end;">
                        <button id="arrest-btn" class="arrest-btn">Arrested</button>
                    </div>
                </div>
            </div>
        </main>

        <!-- Morphokinetic Panel -->
        <aside class="morpho-panel">
            <button id="export-btn" class="morpho-btn" style="margin-bottom: 10px; border-color: var(--accent);">Export
                Notes</button>
            <div style="font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 5px; text-align: center;">Events
            </div>
            <button class="morpho-btn" onclick="viewer.saveNote(viewer.state.currentTimeIndex, 't2PN')">t2PN</button>
            <button class="morpho-btn" onclick="viewer.saveNote(viewer.state.currentTimeIndex, 'tPNf')">tPNf</button>
            <button class="morpho-btn" onclick="viewer.saveNote(viewer.state.currentTimeIndex, 't2')">t2</button>
            <button class="morpho-btn" onclick="viewer.saveNote(viewer.state.currentTimeIndex, 't3')">t3</button>
            <button class="morpho-btn" onclick="viewer.saveNote(viewer.state.currentTimeIndex, 't4')">t4</button>
            <button class="morpho-btn" onclick="viewer.saveNote(viewer.state.currentTimeIndex, 't5')">t5</button>
            <button class="morpho-btn" onclick="viewer.saveNote(viewer.state.currentTimeIndex, 't6')">t6</button>
            <button class="morpho-btn" onclick="viewer.saveNote(viewer.state.currentTimeIndex, 't7')">t7</button>
            <button class="morpho-btn" onclick="viewer.saveNote(viewer.state.currentTimeIndex, 't8')">t8</button>
            <button class="morpho-btn" onclick="viewer.saveNote(viewer.state.currentTimeIndex, 't9+')">t9+</button>
            <button class="morpho-btn" onclick="viewer.saveNote(viewer.state.currentTimeIndex, 'tM')">tM</button>
            <button class="morpho-btn" onclick="viewer.saveNote(viewer.state.currentTimeIndex, 'tSB')">tSB</button>
            <button class="morpho-btn" onclick="viewer.saveNote(viewer.state.currentTimeIndex, 'tB')">tB</button>
        </aside>

        <!-- Morphokinetic Table -->
        <aside class="morpho-table-panel">
            <div class="morpho-table-container">
                <table class="morpho-table">
                    <thead>
                        <tr>
                            <th>Event</th>
                            <th>Time (h)</th>
                        </tr>
                    </thead>
                    <tbody id="morpho-table-body">
                        <!-- Rows injected here -->
                    </tbody>
                </table>
            </div>
        </aside>

        <!-- History Sidebar -->
        <aside class="history-sidebar">
            <div class="history-header">Annotation History</div>
            <ul id="history-list">
                <!-- History items will be injected here -->
            </ul>
        </aside>
    </div>

    <script>
        class PDBViewer {
            constructor() {
                console.log('PDBViewer initialized');
                this.state = {
                    embryos: [],
                    timeline: [], // [{time: 1.0, focals: [-45, -30...]}, ...]
                    currentEmbryoId: null,
                    currentTimeIndex: 0,
                    currentZIndex: 0,
                    isPlaying: false,
                    playbackInterval: null,
                    playbackSpeed: 200, // ms per frame (1x)
                    playbackInterval: null,
                    playbackSpeed: 200, // ms per frame (1x)
                    notes: {}, // { timeIndex: "Note text" }
                    arrested: {}, // { embryoId: true/false }
                    grades: {} // { embryoId: { day3: null, blastocyst: { expansion: null, icm: null, te: null } } }
                };

                this.elements = {
                    embryoList: document.getElementById('embryo-list'),
                    mainImage: document.getElementById('main-image'),
                    timeSlider: document.getElementById('time-slider'),
                    zSlider: document.getElementById('z-slider'),
                    playBtn: document.getElementById('play-btn'),
                    speedSelect: document.getElementById('speed-select'),
                    metaEmbryo: document.getElementById('meta-embryo'),
                    metaTime: document.getElementById('meta-time'),
                    metaZ: document.getElementById('meta-z'),
                    exportBtn: document.getElementById('export-btn'),
                    timelineMarkers: document.getElementById('timeline-markers'),
                    historyList: document.getElementById('history-list'),
                    arrestBtn: document.getElementById('arrest-btn'),
                    // Grading
                    day3Grade: document.getElementById('day3-grade'),
                    blastoExp: document.getElementById('blasto-exp'),
                    blastoIcm: document.getElementById('blasto-icm'),
                    blastoTe: document.getElementById('blasto-te'),
                    blastoCombined: document.getElementById('blasto-combined'),
                    // Table
                    morphoTableBody: document.getElementById('morpho-table-body')
                };

                this.init();
            }

            async init() {
                try {
                    // Load Global Annotations (Arrested state and Grades)
                    const annotationRes = await fetch('/api/annotations/global');
                    if (annotationRes.ok) {
                        const globalData = await annotationRes.json();
                        this.state.arrested = globalData.arrested || {};
                        this.state.grades = globalData.grades || {};
                    }
                } catch (e) {
                    console.error("Failed to load global annotations", e);
                }

                // Fetch Embryos
                try {
                    const res = await fetch('/api/embryos');
                    if (!res.ok) throw new Error('Failed to fetch embryos');
                    this.state.embryos = await res.json();

                    this.renderSidebar();
                    if (this.state.embryos.length > 0) {
                        this.selectEmbryo(this.state.embryos[0]);
                    }
                } catch (e) {
                    console.error(e);
                    alert('Failed to load embryos. Is server.py running?');
                }

                this.setupListeners();
            }

            renderSidebar() {
                this.elements.embryoList.innerHTML = '';
                this.state.embryos.forEach(id => {
                    const li = document.createElement('li');
                    li.className = 'embryo-item';
                    li.textContent = `Embryo ${id}`;
                    if (this.state.arrested[id]) {
                        li.classList.add('arrested');
                    }
                    li.dataset.id = id;
                    li.onclick = () => this.selectEmbryo(id);
                    this.elements.embryoList.appendChild(li);
                });
            }

            async selectEmbryo(id) {
                this.state.currentEmbryoId = id;
                // Update sidebar active state
                document.querySelectorAll('.embryo-item').forEach(el => {
                    el.classList.toggle('active', el.dataset.id == id);
                });

                // Load notes for this embryo
                this.loadNotes(id);
                this.updateArrestButton();
                this.loadGrades(id);

                // Fetch Timeline
                try {
                    const res = await fetch(`/api/timeline?id=${id}`);
                    this.state.timeline = await res.json();

                    // Reset indices
                    this.state.currentTimeIndex = 0;
                    // Default to middle Z if possible
                    if (this.state.timeline.length > 0 && this.state.timeline[0].focals.length > 0) {
                        this.state.currentZIndex = Math.floor(this.state.timeline[0].focals.length / 2);
                    } else {
                        this.state.currentZIndex = 0;
                    }

                    // Configure Time Slider
                    this.elements.timeSlider.max = this.state.timeline.length - 1;
                    this.elements.timeSlider.value = 0;

                    this.renderMarkers();
                    this.updateView();
                } catch (e) {
                    console.error(e);
                }
            }

            setupListeners() {
                this.elements.timeSlider.oninput = (e) => {
                    this.state.currentTimeIndex = parseInt(e.target.value);
                    this.updateView();
                };
                this.elements.zSlider.oninput = (e) => {
                    this.state.currentZIndex = parseInt(e.target.value);
                    this.updateView();
                };
                this.elements.playBtn.onclick = () => this.togglePlayback();
                this.elements.speedSelect.onchange = (e) => this.handleSpeedChange(e);

                this.elements.speedSelect.onchange = (e) => this.handleSpeedChange(e);
                this.elements.exportBtn.onclick = () => this.exportNotes();
                this.elements.arrestBtn.onclick = () => this.toggleArrested();

                // Grading Listeners
                const gradeInputs = [
                    this.elements.day3Grade,
                    this.elements.blastoExp,
                    this.elements.blastoIcm,
                    this.elements.blastoTe
                ];
                gradeInputs.forEach(input => {
                    input.onchange = () => this.saveGrade();
                });

                // Keyboard Navigation
                document.addEventListener('keydown', (e) => {
                    if (this.state.timeline.length === 0) return;

                    if (e.key === 'ArrowUp') {
                        e.preventDefault();
                        this.changeZ(1);
                    } else if (e.key === 'ArrowDown') {
                        e.preventDefault();
                        this.changeZ(-1);
                    }
                });
            }

            changeZ(delta) {
                const maxZ = this.elements.zSlider.max;
                let newZ = this.state.currentZIndex + delta;

                // Clamp
                if (newZ < 0) newZ = 0;
                if (newZ > maxZ) newZ = maxZ;

                if (newZ !== this.state.currentZIndex) {
                    this.state.currentZIndex = newZ;
                    this.elements.zSlider.value = newZ;
                    this.updateView();
                }
            }

            // --- Playback Logic ---

            startPlay() {
                if (this.state.playbackInterval) clearInterval(this.state.playbackInterval);
                this.state.isPlaying = true;
                this.updatePlayButton();

                this.state.playbackInterval = setInterval(() => {
                    this.nextFrame();
                }, this.state.playbackSpeed);
            }

            stopPlay() {
                if (this.state.playbackInterval) {
                    clearInterval(this.state.playbackInterval);
                    this.state.playbackInterval = null;
                }
                this.state.isPlaying = false;
                this.updatePlayButton();
            }

            togglePlayback() {
                if (this.state.isPlaying) {
                    this.stopPlay();
                } else {
                    // If at the end, restart
                    if (this.state.currentTimeIndex >= this.state.timeline.length - 1) {
                        this.state.currentTimeIndex = 0;
                        this.elements.timeSlider.value = 0;
                        this.updateView();
                    }
                    this.startPlay();
                }
            }

            updatePlayButton() {
                this.elements.playBtn.classList.toggle('paused', this.state.isPlaying);
                this.elements.playBtn.setAttribute('aria-label', this.state.isPlaying ? 'Pause' : 'Play');
            }

            nextFrame() {
                if (!this.state.timeline.length) return;

                let nextIndex = this.state.currentTimeIndex + 1;
                if (nextIndex >= this.state.timeline.length) {
                    this.stopPlay(); // Stop at end
                    return;
                }

                this.state.currentTimeIndex = nextIndex;
                this.elements.timeSlider.value = nextIndex;
                this.updateView();
            }

            handleSpeedChange(e) {
                this.state.playbackSpeed = parseInt(e.target.value);
                if (this.state.isPlaying) {
                    this.startPlay(); // Restart with new speed
                }
            }

            // --- Grading Logic ---

            loadGrades(embryoId) {
                const grades = this.state.grades[embryoId] || {
                    day3: '',
                    blastocyst: { expansion: '', icm: '', te: '' }
                };

                this.elements.day3Grade.value = grades.day3 || '';

                // Blastocyst
                const bg = grades.blastocyst || {};
                this.elements.blastoExp.value = bg.expansion || '';
                this.elements.blastoIcm.value = bg.icm || '';
                this.elements.blastoTe.value = bg.te || '';

                this.updateCombinedGrade();
            }

            async saveGrade() {
                if (!this.state.currentEmbryoId) return;

                const grades = {
                    day3: this.elements.day3Grade.value,
                    blastocyst: {
                        expansion: this.elements.blastoExp.value,
                        icm: this.elements.blastoIcm.value,
                        te: this.elements.blastoTe.value
                    }
                };

                this.state.grades[this.state.currentEmbryoId] = grades;
                this.updateCombinedGrade();

                try {
                    await fetch('/api/annotations/grades', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            id: this.state.currentEmbryoId,
                            grades: grades
                        })
                    });
                } catch (e) {
                    console.error('Failed to save grades', e);
                }
            }

            updateCombinedGrade() {
                const e = this.elements.blastoExp.value;
                const i = this.elements.blastoIcm.value;
                const t = this.elements.blastoTe.value;

                if (e && i && t) {
                    this.elements.blastoCombined.textContent = `${e}${i}${t}`;
                    this.elements.blastoCombined.style.color = 'var(--accent)';
                } else {
                    this.elements.blastoCombined.textContent = '-';
                    this.elements.blastoCombined.style.color = 'var(--text-secondary)';
                }
            }

            // --- Annotation Logic ---

            async loadNotes(embryoId) {
                try {
                    const res = await fetch(`/api/annotations/notes?id=${embryoId}`);
                    if (res.ok) {
                        this.state.notes = await res.json();
                    } else {
                        this.state.notes = {};
                    }
                } catch (e) {
                    console.error('Failed to load notes', e);
                    this.state.notes = {};
                }
                this.renderHistory();
                this.renderMorphoTable();
            }

            async saveNote(timeIndex, text) {
                if (!this.state.currentEmbryoId) return;

                if (text.trim() === '') {
                    delete this.state.notes[timeIndex];
                } else {
                    this.state.notes[timeIndex] = text;
                }

                try {
                    await fetch('/api/annotations/notes', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            id: this.state.currentEmbryoId,
                            notes: this.state.notes
                        })
                    });
                } catch (e) {
                    console.error('Failed to save notes', e);
                }

                this.renderMarkers();
                this.renderHistory();
                this.renderMorphoTable();
            }

            async deleteNote(timeIndex) {
                if (!this.state.currentEmbryoId) return;

                delete this.state.notes[timeIndex];

                try {
                    await fetch('/api/annotations/notes', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            id: this.state.currentEmbryoId,
                            notes: this.state.notes
                        })
                    });
                } catch (e) {
                    console.error('Failed to delete note', e);
                }

                this.renderMarkers();
                this.renderHistory();
                this.renderMorphoTable();
            }

            renderMorphoTable() {
                this.elements.morphoTableBody.innerHTML = '';
                const standardEvents = ['t2PN', 'tPNf', 't2', 't3', 't4', 't5', 't6', 't7', 't8', 't9+', 'tM', 'tSB', 'tB'];

                // Create a map of existing events: { "t2": "4.0 h", ... }
                // If duplicates exist, take the first one found (or last? simplified to first)
                const eventMap = {};

                Object.keys(this.state.notes).forEach(idx => {
                    const note = this.state.notes[idx];
                    // Clean note if it has extra chars? 
                    // Assume exact match for now as buttons produce exact strings
                    if (standardEvents.includes(note) && !eventMap[note]) {
                        const normalizedTime = 4.0 + (parseInt(idx) * 0.17);
                        eventMap[note] = normalizedTime.toFixed(1);
                    }
                });

                standardEvents.forEach(evt => {
                    const tr = document.createElement('tr');
                    const timeStr = eventMap[evt] ? eventMap[evt] : '-';
                    tr.innerHTML = `
                        <td>${evt}</td>
                        <td>${timeStr}</td>
                    `;
                    this.elements.morphoTableBody.appendChild(tr);
                });
            }

            renderHistory() {
                this.elements.historyList.innerHTML = '';

                const timeIndices = Object.keys(this.state.notes)
                    .map(k => parseInt(k))
                    .sort((a, b) => a - b);

                if (timeIndices.length === 0) {
                    this.elements.historyList.innerHTML = '<li style="padding: 10px; color: var(--text-secondary); font-size: 0.9rem; font-style: italic;">No annotations yet.</li>';
                    return;
                }

                timeIndices.forEach(idx => {
                    const note = this.state.notes[idx];
                    const timePoint = this.state.timeline[idx];
                    if (!timePoint) return;

                    if (!timePoint) return;

                    // Calculate normalized time: 4.0 + (index * 0.17)
                    const normalizedTime = 4.0 + (idx * 0.17);

                    const li = document.createElement('li');
                    li.className = 'history-item';
                    li.style.display = 'flex';
                    li.style.justifyContent = 'space-between';
                    li.style.alignItems = 'center';
                    li.style.cursor = 'default'; // cursor on parent is default
                    li.style.padding = '5px 10px'; // Move padding to parent

                    // Create clickable content wrapper
                    const contentDiv = document.createElement('div');
                    contentDiv.style.flex = '1';
                    contentDiv.style.cursor = 'pointer';
                    contentDiv.style.marginRight = '10px';
                    contentDiv.innerHTML = `
                        <div class="history-time">Time: ${normalizedTime.toFixed(1)} h</div>
                        <div class="history-note">${note}</div>
                    `;

                    contentDiv.onclick = () => {
                        this.state.currentTimeIndex = idx;
                        this.elements.timeSlider.value = idx;
                        this.updateView();
                    };

                    // Create delete button
                    const deleteBtn = document.createElement('button');
                    deleteBtn.className = 'delete-note-btn';
                    deleteBtn.ariaLabel = 'Delete note';
                    deleteBtn.title = 'Delete note';
                    deleteBtn.innerHTML = `
                        <svg viewBox="0 0 24 24">
                            <path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/>
                        </svg>
                    `;

                    deleteBtn.onclick = (e) => {
                        // Extra safety
                        e.stopPropagation();
                        e.preventDefault();
                        if (confirm('Delete this annotation?')) {
                            this.deleteNote(idx);
                        }
                    };

                    li.appendChild(contentDiv);
                    li.appendChild(deleteBtn);
                    this.elements.historyList.appendChild(li);
                });
            }

            renderMarkers() {
                this.elements.timelineMarkers.innerHTML = '';
                const totalFrames = this.state.timeline.length;
                if (totalFrames === 0) return;

                Object.keys(this.state.notes).forEach(index => {
                    const idx = parseInt(index);
                    if (idx >= 0 && idx < totalFrames) {
                        const marker = document.createElement('div');
                        marker.className = 'timeline-marker';
                        // Calculate percentage position
                        // Note: range input thumb center is what matters. 
                        // Simple percentage is usually close enough for visual indication.
                        const percent = (idx / (totalFrames - 1)) * 100;
                        marker.style.left = `${percent}%`;
                        this.elements.timelineMarkers.appendChild(marker);
                    }
                });
            }

            exportNotes() {
                if (!this.state.currentEmbryoId) return;

                // CSV Header
                let csvContent = "Embryo ID,Normalized Time (h),Note\n";

                const timeIndices = Object.keys(this.state.notes)
                    .map(k => parseInt(k))
                    .sort((a, b) => a - b);

                timeIndices.forEach(idx => {
                    const note = this.state.notes[idx];
                    const timePoint = this.state.timeline[idx];
                    if (!timePoint) return;

                    if (!timePoint) return;

                    // Calculate normalized time: 4.0 + (index * 0.17)
                    const normalizedTime = 4.0 + (idx * 0.17);

                    // Escape note for CSV (wrap in quotes, escape inner quotes)
                    const escapedNote = `"${note.replace(/"/g, '""')}"`;

                    csvContent += `${this.state.currentEmbryoId},${normalizedTime.toFixed(1)},${escapedNote}\n`;
                });

                // Create download
                const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement("a");
                link.setAttribute("href", url);
                link.setAttribute("download", `embryo_${this.state.currentEmbryoId}_notes.csv`);
                link.style.visibility = 'hidden';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            }

            updateView() {
                if (!this.state.timeline.length) return;

                const timePoint = this.state.timeline[this.state.currentTimeIndex];
                const focals = timePoint.focals;

                // Update Z Slider range
                this.elements.zSlider.max = focals.length - 1;

                // Clamp Z index
                if (this.state.currentZIndex >= focals.length) {
                    this.state.currentZIndex = focals.length - 1;
                }
                this.elements.zSlider.value = this.state.currentZIndex;
                const z = focals[this.state.currentZIndex];

                if (this.state.timeline.length > 0) {
                    this.state.initialTime = this.state.timeline[0].time;
                }

                // Update Image
                const url = `/image?id=${this.state.currentEmbryoId}&time=${timePoint.time}&z=${z}`;
                this.elements.mainImage.src = url;

                // Update Metadata
                this.elements.metaEmbryo.textContent = `Embryo: ${this.state.currentEmbryoId}`;

                // Calculate normalized time: 4.0 + (index * 0.17)
                const normalizedTime = 4.0 + (this.state.currentTimeIndex * 0.17);
                this.elements.metaTime.textContent = `Time: ${normalizedTime.toFixed(1)} h`;
                this.elements.metaZ.textContent = `Z: ${z} µm`;

                this.elements.metaZ.textContent = `Z: ${z} µm`;
            }

            async toggleArrested() {
                if (!this.state.currentEmbryoId) return;

                const isArrested = !!this.state.arrested[this.state.currentEmbryoId];
                this.state.arrested[this.state.currentEmbryoId] = !isArrested;

                try {
                    await fetch('/api/annotations/arrested', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            id: this.state.currentEmbryoId,
                            arrested: !isArrested
                        })
                    });
                } catch (e) {
                    console.error('Failed to save arrested state', e);
                }

                // Update UI
                this.updateArrestButton();
                this.updateSidebarItem(this.state.currentEmbryoId);
            }

            updateArrestButton() {
                const isArrested = !!this.state.arrested[this.state.currentEmbryoId];
                const btn = this.elements.arrestBtn;
                if (isArrested) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
                btn.textContent = 'Arrested';
            }

            updateSidebarItem(id) {
                const item = document.querySelector(`.embryo-item[data-id="${id}"]`);
                if (item) {
                    if (this.state.arrested[id]) {
                        item.classList.add('arrested');
                    } else {
                        item.classList.remove('arrested');
                    }
                }
            }
        }

        // Initialize
        let viewer;
        window.addEventListener('DOMContentLoaded', () => {
            viewer = new PDBViewer();
        });
    </script>
</body>

</html>
